<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOs - Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <h1>FoodOs</h1>
        <h2>Quick Upgrade Underway</h2>
        <p>We're currently upgrading FoodOs to serve you better.<br>Kindly stay tuned for something amazing.</p>
        
        <div class="countdown-container">
            <h3>Coming Back In</h3>
            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">7</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>
        </div>
        
        <footer>&copy; 2026 FoodOs. All rights reserved.</footer>
    </div>

    <script src="script.js"></script>

</html>
